<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Meryl Shoes Enterprise System</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .error-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .error-panel {
            background: white;
            border-radius: 12px;
            padding: 60px 40px;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .error-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background: #fee;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .error-title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin: 0 0 15px;
        }
        .error-message {
            font-size: 16px;
            color: #666;
            margin: 0 0 30px;
            line-height: 1.6;
        }
        .error-details {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin: 30px 0;
            text-align: left;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #555;
            word-break: break-word;
            max-height: 200px;
            overflow-y: auto;
        }
        .error-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
        }
        .btn-primary {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary:hover {
            background: #5568d3;
        }
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
            padding: 12px 30px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-secondary:hover {
            background: #d0d0d0;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-panel">
            <div class="error-icon">⚠️</div>
            <h1 class="error-title">{{ title }}</h1>
            <p class="error-message">{{ message }}</p>

            {% if details %}
            <div class="error-details">
                <strong>Details:</strong><br>
                {{ details }}
            </div>
            {% endif %}

            <div class="error-actions">
                <a href="/" class="btn-primary">Go to Dashboard</a>
                <a href="/login" class="btn-secondary">Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
